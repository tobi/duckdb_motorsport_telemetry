name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  wasm-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm-extension
      - uses: oven-sh/setup-bun@v2
      - name: Build WASM extension
        run: scripts/build_wasm_extension.sh
      - name: Build and test browser lab
        run: |
          mkdir -p web/public/v1.5.4/wasm_eh web/public/v1.5.4/wasm_mvp
          cp build/wasm/wasm_eh/motorsport_telemetry.duckdb_extension.wasm web/public/v1.5.4/wasm_eh/
          cp build/wasm/wasm_mvp/motorsport_telemetry.duckdb_extension.wasm web/public/v1.5.4/wasm_mvp/
          cd web
          bun install --frozen-lockfile
          bun run build
          bunx vite preview --host 127.0.0.1 --port 4173 &
          server=$!
          trap 'kill $server' EXIT
          sleep 2
          CHROME=/usr/bin/google-chrome node tests/smoke.mjs

  community-extension-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build with DuckDB Community Extension tooling
        run: make DUCKDB_PLATFORM=linux_amd64 TARGET_DUCKDB_VERSION=v1.5.4 release

  duckdb-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install DuckDB CLI
        run: |
          curl -L -o duckdb.zip https://github.com/duckdb/duckdb/releases/download/v1.4.3/duckdb_cli-linux-amd64.zip
          unzip duckdb.zip
          chmod +x duckdb
          echo "$PWD" >> "$GITHUB_PATH"
      - run: make integration-test
