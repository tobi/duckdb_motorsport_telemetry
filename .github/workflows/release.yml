name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux_amd64
            library: target/release/libmotorsport_telemetry.so
          - os: windows-latest
            platform: windows_amd64
            library: target/release/motorsport_telemetry.dll
          - os: macos-14
            platform: osx_arm64
            library: target/release/libmotorsport_telemetry.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p duckdb-motorsport-telemetry
      - name: Package DuckDB extension
        shell: bash
        run: |
          python scripts/package_extension.py \
            --library '${{ matrix.library }}' \
            --output 'dist/${{ matrix.platform }}/motorsport_telemetry.duckdb_extension' \
            --platform '${{ matrix.platform }}' \
            --extension-version '${{ github.ref_name }}'
          python - <<'PY'
          from zipfile import ZIP_DEFLATED, ZipFile
          platform = '${{ matrix.platform }}'
          extension = f'dist/{platform}/motorsport_telemetry.duckdb_extension'
          with ZipFile(f'dist/motorsport_telemetry-{platform}.zip', 'w', ZIP_DEFLATED) as archive:
              archive.write(extension, 'motorsport_telemetry.duckdb_extension')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: motorsport_telemetry-${{ matrix.platform }}
          path: |
            dist/motorsport_telemetry-${{ matrix.platform }}.zip
            dist/${{ matrix.platform }}/motorsport_telemetry.duckdb_extension

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: dist/*.zip

  publish-extension-repository:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Build DuckDB extension repository
        run: |
          for platform in linux_amd64 windows_amd64 osx_arm64; do
            mkdir -p "site/v1.4.3/$platform"
            gzip -9 -c "dist/$platform/motorsport_telemetry.duckdb_extension" \
              > "site/v1.4.3/$platform/motorsport_telemetry.duckdb_extension.gz"
          done
          python - <<'PY'
          from pathlib import Path
          Path('site/index.html').write_text('''<!doctype html>
          <html lang="en"><meta charset="utf-8"><meta name="viewport" content="width=device-width">
          <title>DuckDB Motorsport Telemetry Extension Repository</title>
          <style>body{font:18px/1.55 system-ui;max-width:850px;margin:4rem auto;padding:0 1.5rem;color:#222}code,pre{background:#f3f3f3;border-radius:6px}code{padding:.15rem .35rem}pre{padding:1rem;overflow:auto}a{color:#075dcc}</style>
          <h1>DuckDB Motorsport Telemetry</h1>
          <p>DuckDB extension repository for Cosworth PDS, MoTeC LD, and VBOX VBO telemetry.</p>
          <pre>duckdb -unsigned

INSTALL httpfs;
LOAD httpfs;
INSTALL motorsport_telemetry
FROM 'https://pages.tobi.lutke.com/duckdb_motorsport_telemetry';
LOAD motorsport_telemetry;</pre>
          <p><a href="https://github.com/tobi/duckdb_motorsport_telemetry">Source, documentation, and releases</a></p>
          <p>DuckDB 1.4.3: <a href="v1.4.3/linux_amd64/motorsport_telemetry.duckdb_extension.gz">Linux x86-64</a> · <a href="v1.4.3/windows_amd64/motorsport_telemetry.duckdb_extension.gz">Windows x86-64</a> · <a href="v1.4.3/osx_arm64/motorsport_telemetry.duckdb_extension.gz">macOS Apple Silicon</a></p>
          </html>''')
          PY
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy extension repository
        id: deployment
        uses: actions/deploy-pages@v4
