name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux_amd64
            library: target/release/libmotorsport_telemetry.so
          - os: windows-latest
            platform: windows_amd64
            library: target/release/motorsport_telemetry.dll
          - os: macos-14
            platform: osx_arm64
            library: target/release/libmotorsport_telemetry.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p duckdb-motorsport-telemetry
      - name: Package DuckDB extension
        shell: bash
        run: |
          python scripts/package_extension.py \
            --library '${{ matrix.library }}' \
            --output 'dist/${{ matrix.platform }}/motorsport_telemetry.duckdb_extension' \
            --platform '${{ matrix.platform }}' \
            --extension-version '${{ github.ref_name }}'
          python - <<'PY'
          from zipfile import ZIP_DEFLATED, ZipFile
          platform = '${{ matrix.platform }}'
          extension = f'dist/{platform}/motorsport_telemetry.duckdb_extension'
          with ZipFile(f'dist/motorsport_telemetry-{platform}.zip', 'w', ZIP_DEFLATED) as archive:
              archive.write(extension, 'motorsport_telemetry.duckdb_extension')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: motorsport_telemetry-${{ matrix.platform }}
          path: |
            dist/motorsport_telemetry-${{ matrix.platform }}.zip
            dist/${{ matrix.platform }}/motorsport_telemetry.duckdb_extension

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm-extension
      - name: Build DuckDB-Wasm extension
        run: scripts/build_wasm_extension.sh
      - uses: actions/upload-artifact@v4
        with:
          name: motorsport_telemetry-wasm
          path: |
            build/wasm/wasm_eh/motorsport_telemetry.duckdb_extension.wasm
            build/wasm/wasm_mvp/motorsport_telemetry.duckdb_extension.wasm

  publish:
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: dist/*.zip

  publish-extension-repository:
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: oven-sh/setup-bun@v2
      - name: Build browser telemetry lab
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build
      - name: Build DuckDB extension repository
        run: |
          mkdir -p site
          cp -R web/dist/. site/
          for platform in linux_amd64 windows_amd64 osx_arm64; do
            mkdir -p "site/v1.4.3/$platform"
            gzip -9 -c "dist/$platform/motorsport_telemetry.duckdb_extension" \
              > "site/v1.4.3/$platform/motorsport_telemetry.duckdb_extension.gz"
          done
          for platform in wasm_eh wasm_mvp; do
            mkdir -p "site/v1.5.4/$platform"
            cp "dist/$platform/motorsport_telemetry.duckdb_extension.wasm" \
              "site/v1.5.4/$platform/motorsport_telemetry.duckdb_extension.wasm"
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy extension repository
        id: deployment
        uses: actions/deploy-pages@v4
